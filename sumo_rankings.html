<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fantasy Sumo - Haru Basho</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #90EE90 0%, #228B22 100%);
            min-height: 100vh;
            padding: 10px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            overflow: hidden;
        }

        .header {
            background-image: url('images/nobori-bg.jpeg');
            background-size: cover;
            background-position: center;
            color: white;
            padding: 25px 20px;
            text-align: center;
            position: relative;
        }

        .header::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.7);
            z-index: 1;
        }

        .header h1 {
            font-size: 2.2em;
            margin-bottom: 5px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
            position: relative;
            z-index: 2;
        }

        .header p {
            font-size: 1.1em;
            opacity: 0.9;
            position: relative;
            z-index: 2;
        }

        .content {
            padding: 20px;
        }

        .leaderboard {
            display: grid;
            gap: 15px;
        }

        .leaderboard-item {
            background-image: url('images/nobori-bg.jpeg');
            background-size: cover;
            background-position: center;
            border-radius: 12px;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: 3px solid transparent;
            position: relative;
            overflow: hidden;
            cursor: pointer;
        }

        .leaderboard-item::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(255, 255, 255, 0.3);
            backdrop-filter: blur(2px);
            z-index: 1;
        }

        .leaderboard-item.expanded::before {
            background: rgba(255, 255, 255, 0.4);
        }

        .leaderboard-item:nth-child(1)::before {
            background: rgba(255, 215, 0, 0.4);
        }

        .leaderboard-item:nth-child(2)::before {
            background: rgba(192, 192, 192, 0.4);
        }

        .leaderboard-item:nth-child(3)::before {
            background: rgba(205, 127, 50, 0.4);
        }

        .leaderboard-content {
            position: relative;
            z-index: 2;
            padding: 20px;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .leaderboard-item::after {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.3), transparent);
            transition: left 0.5s;
            z-index: 3;
        }

        .leaderboard-item:hover::after {
            left: 100%;
        }

        .leaderboard-item:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 35px rgba(0,0,0,0.3);
            border-color: #ff6b6b;
        }

        .leaderboard-item:nth-child(1) {
            border-color: #ffd700;
        }

        .leaderboard-item:nth-child(2) {
            border-color: #c0c0c0;
        }

        .leaderboard-item:nth-child(3) {
            border-color: #cd7f32;
        }

        .rank {
            font-size: 28px;
            font-weight: bold;
            width: 60px;
            text-align: center;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .rank-1 { 
            color: #fff;
            background: radial-gradient(circle, #ff6b6b, #ee5a24);
            border-radius: 50%;
            width: 50px;
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 5px 15px rgba(255, 107, 107, 0.4);
        }

        .rank-2 { 
            color: #fff;
            background: radial-gradient(circle, #666, #333);
            border-radius: 50%;
            width: 50px;
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 5px 15px rgba(0,0,0,0.4);
        }

        .rank-3 { 
            color: #fff;
            background: radial-gradient(circle, #8b4513, #654321);
            border-radius: 50%;
            width: 50px;
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 5px 15px rgba(139, 69, 19, 0.4);
        }

        .player-info {
            flex: 1;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .player-avatar {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid #fff;
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
            transition: all 0.3s;
        }

        .leaderboard-item:hover .player-avatar {
            transform: scale(1.1) rotate(5deg);
        }

        .player-details h3 {
            margin-bottom: 5px;
            color: #333;
            font-size: 1.2em;
            font-weight: 700;
        }

        .player-picks {
            color: #666;
            font-size: 0.85em;
            opacity: 0.8;
        }

        .player-score {
            font-size: 24px;
            font-weight: bold;
            color: #ff6b6b;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.1);
            min-width: 60px;
            text-align: center;
        }

        .crown {
            position: absolute;
            top: -8px;
            right: 15px;
            font-size: 1.6em;
            animation: bounce 2s infinite;
            z-index: 4;
        }

        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% {
                transform: translateY(0);
            }
            40% {
                transform: translateY(-8px);
            }
            60% {
                transform: translateY(-4px);
            }
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(-100px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .leaderboard-item:nth-child(1) {
            animation: slideIn 0.8s ease-out 0.2s both;
        }

        .leaderboard-item:nth-child(2) {
            animation: slideIn 0.8s ease-out 0.4s both;
        }

        .leaderboard-item:nth-child(3) {
            animation: slideIn 0.8s ease-out 0.6s both;
        }

        .header {
            animation: fadeIn 1s ease-out;
        }

        .content {
            animation: fadeIn 1s ease-out 0.3s both;
        }

        .trophy-icon {
            font-size: 1.2em;
            margin-right: 8px;
        }

        /* Daily scores section */
        .daily-scores {
            margin-top: 15px;
            padding-top: 15px;
            border-top: 2px solid rgba(0, 0, 0, 0.2);
            display: none;
        }

        .leaderboard-item.expanded .daily-scores {
            display: block;
            animation: fadeIn 0.5s ease-out;
        }

        .daily-scores h4 {
            color: #333;
            margin-bottom: 10px;
            font-size: 1.1em;
            font-weight: 700;
        }

        .daily-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(60px, 1fr));
            gap: 10px;
            max-height: 200px;
            overflow-y: auto;
        }

        .daily-score {
            background: rgba(255, 107, 107, 0.2);
            border: 2px solid rgba(255, 107, 107, 0.5);
            border-radius: 8px;
            padding: 12px 6px;
            text-align: center;
            font-size: 0.9em;
            font-weight: 600;
        }

        .daily-score .day {
            color: #ff6b6b;
            font-size: 0.8em;
            margin-bottom: 4px;
        }

        .daily-score .score {
            display: block;
            font-size: 1.1em;
            color: #333;
            font-weight: bold;
        }

        /* Mobile Responsive */
        @media (max-width: 768px) {
            body {
                padding: 5px;
            }

            .container {
                border-radius: 10px;
            }

            .header {
                padding: 20px 15px;
            }

            .header h1 {
                font-size: 1.8em;
            }

            .header p {
                font-size: 1em;
            }

            .content {
                padding: 15px;
            }

            .leaderboard-content {
                flex-direction: column;
                align-items: flex-start;
                gap: 10px;
            }

            .player-info {
                flex-direction: column;
                align-items: flex-start;
                gap: 10px;
                width: 100%;
            }

            .player-details h3 {
                font-size: 1.1em;
            }

            .player-picks {
                font-size: 0.8em;
            }

            .player-score {
                font-size: 20px;
                align-self: flex-end;
            }

            .player-avatar {
                width: 50px;
                height: 50px;
            }

            .rank {
                width: 45px;
                font-size: 24px;
            }

            .rank-1, .rank-2, .rank-3 {
                width: 45px;
                height: 45px;
            }

            .daily-grid {
                grid-template-columns: repeat(auto-fit, minmax(50px, 1fr));
                gap: 6px;
            }

            .daily-score {
                padding: 8px 4px;
                font-size: 0.8em;
            }
        }

        @media (max-width: 480px) {
            .header h1 {
                font-size: 1.5em;
            }

            .player-details h3 {
                font-size: 1em;
            }

            .player-picks {
                font-size: 0.75em;
            }

            .player-score {
                font-size: 18px;
            }

            .player-avatar {
                width: 40px;
                height: 40px;
            }

            .rank {
                width: 40px;
                font-size: 20px;
            }

            .rank-1, .rank-2, .rank-3 {
                width: 40px;
                height: 40px;
            }

            .daily-score {
                font-size: 0.75em;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1><span class="trophy-icon">🏆</span>Fantasy Sumo - Haru Basho</h1>
            <p>Leaderboard - As of Day 0</p>
        </div>
        
        <div class="content">
            <div id="leaderboard-content" class="leaderboard">
                <!-- Leaderboard will be populated by JavaScript -->
            </div>
        </div>
    </div>

    <script>
        // Player avatars - different for the leader
        const playerAvatars = {
            leader: 'https://picsum.photos/seed/sumo-champion/60/60.jpg',
            player1: 'https://picsum.photos/seed/sumo-r1/60/60.jpg',
            player2: 'https://picsum.photos/seed/sumo-r2/60/60.jpg',
            player3: 'https://picsum.photos/seed/sumo-r3/60/60.jpg'
        };

        // Predefined players with their picks and scores
        const players = [
            {
                id: 1,
                name: "Lisa",
                picks: ["Hakuhō", "Kisenosato", "Kakuryū", "Terunofuji"],
                totalScore: 45,
                dailyScores: {
                    1: 3, 2: 2, 3: 4, 4: 1, 5: 3, 6: 2, 7: 4, 8: 3, 9: 2, 10: 1,
                    11: 3, 12: 2, 13: 4, 14: 1, 15: 3
                }
            },
            {
                id: 2,
                name: "Mark", 
                picks: ["Kakuryū", "Hakuhō", "Terunofuji", "Kisenosato"],
                totalScore: 38,
                dailyScores: {
                    1: 2, 2: 3, 3: 1, 4: 4, 5: 2, 6: 3, 7: 1, 8: 2, 9: 4, 10: 3,
                    11: 2, 12: 1, 13: 3, 14: 2, 15: 4
                }
            },
            {
                id: 3,
                name: "Tae",
                picks: ["Terunofuji", "Kisenosato", "Hakuhō", "Kakuryū"], 
                totalScore: 42,
                dailyScores: {
                    1: 4, 2: 1, 3: 3, 4: 2, 5: 4, 6: 1, 7: 3, 8: 4, 9: 1, 10: 2,
                    11: 4, 12: 3, 13: 1, 14: 4, 15: 2
                }
            }
        ];

        // Initialize the app
        function initApp() {
            updateLeaderboard();
        }

        // Update leaderboard display
        function updateLeaderboard() {
            // Sort players by score (descending)
            const sortedPlayers = [...players].sort((a, b) => b.totalScore - a.totalScore);
            
            const leaderboardContent = document.getElementById('leaderboard-content');
            
            leaderboardContent.innerHTML = sortedPlayers.map((player, index) => {
                const rankClass = index === 0 ? 'rank-1' : index === 1 ? 'rank-2' : index === 2 ? 'rank-3' : '';
                const avatarUrl = index === 0 ? playerAvatars.leader : playerAvatars[`player${player.id}`];
                const crownIcon = index === 0 ? '<span class="crown">👑</span>' : '';
                
                return `
                    <div class="leaderboard-item" onclick="togglePlayerDetails(${player.id})">
                        ${crownIcon}
                        <div class="leaderboard-content">
                            <div class="rank ${rankClass}">#${index + 1}</div>
                            <div class="player-info">
                                <img src="${avatarUrl}" alt="${player.name}" class="player-avatar">
                                <div class="player-details">
                                    <h3>${player.name}</h3>
                                    <div class="player-picks">Rikishi: ${player.picks.join(' → ')}</div>
                                </div>
                            </div>
                            <div class="player-score">${player.totalScore}</div>
                        </div>
                        <div class="daily-scores" id="daily-${player.id}">
                            <h4>Daily Scores</h4>
                            <div class="daily-grid">
                                ${Object.entries(player.dailyScores).map(([day, score]) => `
                                    <div class="daily-score">
                                        <span class="day">Day ${day}</span>
                                        <span class="score">${score}</span>
                                    </div>
                                `).join('')}
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        // Toggle player details (show/hide daily scores)
        function togglePlayerDetails(playerId) {
            const playerElement = document.querySelector(`#daily-${playerId}`).parentElement;
            const isExpanded = playerElement.classList.contains('expanded');
            
            // Close all expanded items
            document.querySelectorAll('.leaderboard-item').forEach(item => {
                item.classList.remove('expanded');
            });
            
            // Toggle the clicked item
            if (!isExpanded) {
                playerElement.classList.add('expanded');
            }
        }

        // Load data on page load
        window.addEventListener('load', initApp);
    </script>
</body>
</html>
