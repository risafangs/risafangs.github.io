<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fantasy Sumo Rankings</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #ff6b6b, #ee5a24);
            color: white;
            padding: 30px;
            text-align: center;
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .content {
            padding: 30px;
        }

        .leaderboard {
            display: grid;
            gap: 20px;
        }

        .leaderboard-item {
            display: flex;
            align-items: center;
            background: linear-gradient(135deg, #f8f9fa, #e9ecef);
            padding: 25px;
            border-radius: 15px;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: 3px solid transparent;
            position: relative;
            overflow: hidden;
        }

        .leaderboard-item::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.4), transparent);
            transition: left 0.5s;
        }

        .leaderboard-item:hover::before {
            left: 100%;
        }

        .leaderboard-item:hover {
            transform: translateX(15px) scale(1.02);
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            border-color: #ff6b6b;
        }

        .leaderboard-item:nth-child(1) {
            background: linear-gradient(135deg, #ffd700, #ffed4e);
            border: 3px solid #ffd700;
        }

        .leaderboard-item:nth-child(2) {
            background: linear-gradient(135deg, #c0c0c0, #e8e8e8);
            border: 3px solid #c0c0c0;
        }

        .leaderboard-item:nth-child(3) {
            background: linear-gradient(135deg, #cd7f32, #daa520);
            border: 3px solid #cd7f32;
        }

        .rank {
            font-size: 36px;
            font-weight: bold;
            width: 80px;
            text-align: center;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .rank-1 { 
            color: #fff;
            background: radial-gradient(circle, #ff6b6b, #ee5a24);
            border-radius: 50%;
            width: 60px;
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 5px 15px rgba(255, 107, 107, 0.4);
        }

        .rank-2 { 
            color: #fff;
            background: radial-gradient(circle, #666, #333);
            border-radius: 50%;
            width: 60px;
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 5px 15px rgba(0,0,0,0.4);
        }

        .rank-3 { 
            color: #fff;
            background: radial-gradient(circle, #8b4513, #654321);
            border-radius: 50%;
            width: 60px;
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 5px 15px rgba(139, 69, 19, 0.4);
        }

        .player-info {
            flex: 1;
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .player-avatar {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid #fff;
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
            transition: all 0.3s;
        }

        .leaderboard-item:hover .player-avatar {
            transform: scale(1.1) rotate(5deg);
        }

        .player-details h3 {
            margin-bottom: 8px;
            color: #333;
            font-size: 1.4em;
            font-weight: 700;
        }

        .player-picks {
            color: #666;
            font-size: 0.9em;
            opacity: 0.8;
        }

        .player-score {
            font-size: 32px;
            font-weight: bold;
            color: #ff6b6b;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.1);
            min-width: 80px;
            text-align: center;
        }

        .crown {
            position: absolute;
            top: -10px;
            right: 20px;
            font-size: 2em;
            animation: bounce 2s infinite;
        }

        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% {
                transform: translateY(0);
            }
            40% {
                transform: translateY(-10px);
            }
            60% {
                transform: translateY(-5px);
            }
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(-100px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .leaderboard-item:nth-child(1) {
            animation: slideIn 0.8s ease-out 0.2s both;
        }

        .leaderboard-item:nth-child(2) {
            animation: slideIn 0.8s ease-out 0.4s both;
        }

        .leaderboard-item:nth-child(3) {
            animation: slideIn 0.8s ease-out 0.6s both;
        }

        .header {
            animation: fadeIn 1s ease-out;
        }

        .content {
            animation: fadeIn 1s ease-out 0.3s both;
        }

        .trophy-icon {
            font-size: 1.2em;
            margin-right: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1><span class="trophy-icon">🏆</span>Fantasy Sumo - March Basho</h1>
            <p>Live Leaderboard</p>
        </div>
        
        <div class="content">
            <div id="leaderboard-content" class="leaderboard">
                <!-- Leaderboard will be populated by JavaScript -->
            </div>
        </div>
    </div>

    <script>
        // Player avatars - different for the leader
        const playerAvatars = {
            leader: 'https://picsum.photos/seed/champion-crown/80/80.jpg',
            player1: 'https://picsum.photos/seed/player1/80/80.jpg',
            player2: 'https://picsum.photos/seed/player2/80/80.jpg',
            player3: 'https://picsum.photos/seed/player3/80/80.jpg'
        };

        // Predefined players with their picks and scores
        const players = [
            {
                id: 1,
                name: "Lisa",
                picks: ["Onosato", "Team C", "Team B", "Team D"],
                totalScore: 45
            },
            {
                id: 2,
                name: "Mark", 
                picks: ["Hoshoryu", "Team A", "Team D", "Team C"],
                totalScore: 38
            },
            {
                id: 3,
                name: "Tae",
                picks: ["Onosato", "Team B", "Team A", "Team D"], 
                totalScore: 42
            }
        ];

        // Initialize the app
        function initApp() {
            updateLeaderboard();
        }

        // Update leaderboard display
        function updateLeaderboard() {
            // Sort players by score (descending)
            const sortedPlayers = [...players].sort((a, b) => b.totalScore - a.totalScore);
            
            const leaderboardContent = document.getElementById('leaderboard-content');
            
            leaderboardContent.innerHTML = sortedPlayers.map((player, index) => {
                const rankClass = index === 0 ? 'rank-1' : index === 1 ? 'rank-2' : index === 2 ? 'rank-3' : '';
                const avatarUrl = index === 0 ? playerAvatars.leader : playerAvatars[`player${player.id}`];
                const crownIcon = index === 0 ? '<span class="crown">👑</span>' : '';
                
                return `
                    <div class="leaderboard-item">
                        ${crownIcon}
                        <div class="rank ${rankClass}">#${index + 1}</div>
                        <div class="player-info">
                            <img src="${avatarUrl}" alt="${player.name}" class="player-avatar">
                            <div class="player-details">
                                <h3>${player.name}</h3>
                                <div class="player-picks">Picks: ${player.picks.join(' → ')}</div>
                            </div>
                        </div>
                        <div class="player-score">${player.totalScore}</div>
                    </div>
                `;
            }).join('');
        }

        // Load data on page load
        window.addEventListener('load', initApp);
    </script>
</body>
</html>
